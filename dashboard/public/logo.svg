<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#101530"/>
    </linearGradient>
    <linearGradient id="shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Shield outline — rounded pointed shape -->
  <path d="
    M256 68
    C256 68 108 108 108 228
    C108 348 200 432 256 460
    C312 432 404 348 404 228
    C404 108 256 68 256 68Z
  " fill="none" stroke="url(#shield)" stroke-width="4" opacity="0.2"/>

  <!-- Connection lines from center to outer nodes -->
  <line x1="256" y1="256" x2="176" y2="168" stroke="url(#line1)" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="336" y2="168" stroke="url(#line1)" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="148" y2="272" stroke="url(#line1)" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="364" y2="272" stroke="url(#line1)" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="192" y2="368" stroke="url(#line1)" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="320" y2="368" stroke="url(#line1)" stroke-width="3" opacity="0.4" stroke-linecap="round"/>

  <!-- Outer nodes — the services -->
  <circle cx="176" cy="168" r="16" fill="#111627" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="336" cy="168" r="16" fill="#111627" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="148" cy="272" r="16" fill="#111627" stroke="#6366f1" stroke-width="3"/>
  <circle cx="364" cy="272" r="16" fill="#111627" stroke="#6366f1" stroke-width="3"/>
  <circle cx="192" cy="368" r="16" fill="#111627" stroke="#818cf8" stroke-width="3"/>
  <circle cx="320" cy="368" r="16" fill="#111627" stroke="#818cf8" stroke-width="3"/>

  <!-- Inner dots in nodes -->
  <circle cx="176" cy="168" r="5" fill="#60a5fa"/>
  <circle cx="336" cy="168" r="5" fill="#60a5fa"/>
  <circle cx="148" cy="272" r="5" fill="#818cf8"/>
  <circle cx="364" cy="272" r="5" fill="#818cf8"/>
  <circle cx="192" cy="368" r="5" fill="#a78bfa"/>
  <circle cx="320" cy="368" r="5" fill="#a78bfa"/>

  <!-- Center hub — the hearth -->
  <circle cx="256" cy="256" r="40" fill="url(#warm)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="24" fill="#fef3c7" opacity="0.9"/>
  <circle cx="256" cy="256" r="12" fill="#ffffff"/>
</svg>
