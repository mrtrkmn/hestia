[Interface]
Address = 10.100.0.1/24
ListenPort = 51820
PrivateKey = <SERVER_PRIVATE_KEY>
PostUp = iptables -A FORWARD -i wg0 -d 127.0.0.0/8 -j ACCEPT; iptables -A FORWARD -i wg0 -j DROP
PostDown = iptables -D FORWARD -i wg0 -d 127.0.0.0/8 -j ACCEPT; iptables -D FORWARD -i wg0 -j DROP

# VPN clients can only reach Hub services on localhost (ports 80, 443, 8000-8004, 9091)
# Lateral access to other LAN devices is blocked by the FORWARD DROP rule above.

# [Peer]
# PublicKey = <CLIENT_PUBLIC_KEY>
# PresharedKey = <PRESHARED_KEY>
# AllowedIPs = 10.100.0.2/32
