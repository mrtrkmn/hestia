  <text x="727" y="225" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">Process</text>
  <!-- Section header -->
  <text x="272" y="278" fill="#4a5178" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="0.8">JOBS</text>
  <!-- Table header -->
  <text x="292" y="306" fill="#4a5178" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="0.6">ID</text>
  <text x="420" y="306" fill="#4a5178" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="0.6">OPERATION</text>
  <text x="620" y="306" fill="#4a5178" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="0.6">STATUS</text>
  <text x="780" y="306" fill="#4a5178" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="0.6">PROGRESS</text>
  <text x="1020" y="306" fill="#4a5178" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="0.6">ACTIONS</text>
  <line x1="272" y1="316" x2="1172" y2="316" stroke="#1e2540"/>
  <!-- Row 1: completed -->
  <text x="292" y="344" fill="#c0c4d8" font-family="monospace" font-size="12">a3f8c2d1</text>
  <text x="420" y="344" fill="#c0c4d8" font-family="system-ui" font-size="13">pdf_ocr</text>
  <rect x="620" y="330" width="76" height="20" rx="10" fill="rgba(34,197,94,0.12)"/>
  <circle cx="632" cy="340" r="3" fill="#22c55e"/>
  <text x="639" y="344" fill="#4ade80" font-family="system-ui" font-size="10" font-weight="600">completed</text>
  <rect x="780" y="336" width="140" height="6" rx="3" fill="#1e2540"/>
  <rect x="780" y="336" width="140" height="6" rx="3" fill="url(#prog)"/>
  <rect x="1020" y="328" width="86" height="26" rx="8" fill="#3b82f6"/>
  <text x="1040" y="346" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Download</text>
  <line x1="272" y1="360" x2="1172" y2="360" stroke="rgba(30,37,64,0.6)"/>
  <!-- Row 2: running -->
  <text x="292" y="388" fill="#c0c4d8" font-family="monospace" font-size="12">b7e4f9a2</text>
  <text x="420" y="388" fill="#c0c4d8" font-family="system-ui" font-size="13">video_transcode</text>
  <rect x="620" y="374" width="62" height="20" rx="10" fill="rgba(59,130,246,0.12)"/>
  <circle cx="632" cy="384" r="3" fill="#3b82f6"><animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/></circle>
  <text x="639" y="388" fill="#60a5fa" font-family="system-ui" font-size="10" font-weight="600">running</text>
  <rect x="780" y="380" width="140" height="6" rx="3" fill="#1e2540"/>
  <rect x="780" y="380" width="91" height="6" rx="3" fill="url(#prog)"/>
  <text x="930" y="388" fill="#7b83a6" font-family="system-ui" font-size="11">65%</text>
  <line x1="272" y1="404" x2="1172" y2="404" stroke="rgba(30,37,64,0.6)"/>
  <!-- Row 3: pending -->
  <text x="292" y="432" fill="#c0c4d8" font-family="monospace" font-size="12">c1d2e3f4</text>
  <text x="420" y="432" fill="#c0c4d8" font-family="system-ui" font-size="13">pdf_compress</text>
  <rect x="620" y="418" width="62" height="20" rx="10" fill="rgba(59,130,246,0.12)"/>
  <circle cx="632" cy="428" r="3" fill="#3b82f6"/>
  <text x="639" y="432" fill="#60a5fa" font-family="system-ui" font-size="10" font-weight="600">pending</text>
  <rect x="780" y="424" width="140" height="6" rx="3" fill="#1e2540"/>
  <rect x="1020" y="418" width="66" height="26" rx="8" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.2)"/>
  <text x="1035" y="436" fill="#f87171" font-family="system-ui" font-size="12" font-weight="600">Cancel</text>
  <line x1="272" y1="448" x2="1172" y2="448" stroke="rgba(30,37,64,0.6)"/>
  <!-- Row 4: failed -->
  <text x="292" y="476" fill="#c0c4d8" font-family="monospace" font-size="12">d5e6f7a8</text>
  <text x="420" y="476" fill="#c0c4d8" font-family="system-ui" font-size="13">pdf_merge</text>
  <rect x="620" y="462" width="52" height="20" rx="10" fill="rgba(239,68,68,0.12)"/>
  <circle cx="632" cy="472" r="3" fill="#ef4444"/>
  <text x="639" y="476" fill="#f87171" font-family="system-ui" font-size="10" font-weight="600">failed</text>
  <rect x="780" y="468" width="140" height="6" rx="3" fill="#1e2540"/>
  <rect x="780" y="468" width="56" height="6" rx="3" fill="#ef4444"/>
</svg>
