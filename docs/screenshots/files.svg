<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="prog" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
  </defs>
  <rect width="1200" height="700" fill="#0b0e1a"/>
  <!-- Sidebar -->
  <rect width="240" height="700" fill="#111627"/>
  <line x1="240" y1="0" x2="240" y2="700" stroke="#1e2540"/>
  <rect x="20" y="18" width="32" height="32" rx="8" fill="url(#logo)"/>
  <path d="M28 14c0 0-5 4.5-5 9.5C23 26.1 25.2 28 28 28s5-1.9 5-4.5C33 18.5 28 14 28 14z" fill="rgba(255,255,255,0.85)"/><ellipse cx="28" cy="24.5" rx="2" ry="2.8" fill="rgba(59,130,246,0.5)"/>
  <text x="62" y="40" fill="#e8eaf0" font-family="system-ui" font-weight="700" font-size="20">Hestia</text>
  <line x1="0" y1="64" x2="240" y2="64" stroke="#1e2540"/>
  <text x="24" y="100" fill="#7b83a6" font-size="16">📊</text>
  <text x="50" y="100" fill="#7b83a6" font-family="system-ui" font-size="14">Dashboard</text>
  <rect x="10" y="112" width="220" height="38" rx="8" fill="rgba(59,130,246,0.12)"/>
  <text x="24" y="136" fill="#3b82f6" font-size="16">📁</text>
  <text x="50" y="136" fill="#3b82f6" font-family="system-ui" font-size="14" font-weight="600">Files</text>
  <text x="24" y="172" fill="#7b83a6" font-size="16">⚡</text>
  <text x="50" y="172" fill="#7b83a6" font-family="system-ui" font-size="14">Pipelines</text>
  <text x="24" y="206" fill="#7b83a6" font-size="16">💾</text>
  <text x="50" y="206" fill="#7b83a6" font-family="system-ui" font-size="14">Storage</text>
  <text x="24" y="240" fill="#7b83a6" font-size="16">🔌</text>
  <text x="50" y="240" fill="#7b83a6" font-family="system-ui" font-size="14">IoT</text>
  <text x="24" y="274" fill="#7b83a6" font-size="16">⚙️</text>
  <text x="50" y="274" fill="#7b83a6" font-family="system-ui" font-size="14">Admin</text>
  <!-- Topbar -->
  <rect x="240" y="0" width="960" height="56" fill="rgba(11,14,26,0.9)"/>
  <line x1="240" y1="56" x2="1200" y2="56" stroke="#1e2540"/>
  <text x="272" y="34" fill="#e8eaf0" font-family="system-ui" font-size="16" font-weight="600">Files</text>
  <text x="1140" y="34" fill="#4a5178" font-family="system-ui" font-size="12">v1.0.0</text>
  <!-- Dropzone -->
  <rect x="272" y="76" width="900" height="80" rx="12" fill="rgba(17,22,39,0.5)" stroke="#1e2540" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="722" y="116" fill="#4a5178" font-family="system-ui" font-size="14" text-anchor="middle">Drag &amp; drop files here, or click to select</text>
  <text x="722" y="136" fill="#2a3356" font-family="system-ui" font-size="12" text-anchor="middle">PDF, PNG, JPEG, MP4, MKV, AVI, MP3, FLAC, WAV up to 10 GB</text>
  <!-- Operation card -->
  <rect x="272" y="174" width="900" height="68" rx="10" fill="#111627" stroke="#1e2540"/>
  <text x="292" y="198" fill="#4a5178" font-family="system-ui" font-size="11" font-weight="600" letter-spacing="0.4">OPERATION</text>
  <rect x="292" y="206" width="200" height="28" rx="8" fill="#0b0e1a" stroke="#1e2540"/>
  <text x="306" y="225" fill="#e8eaf0" font-family="system-ui" font-size="13">OCR (make searchable)</text>
  <text x="520" y="198" fill="#4a5178" font-family="system-ui" font-size="11" font-weight="600" letter-spacing="0.4">TARGET FORMAT</text>
  <rect x="520" y="206" width="140" height="28" rx="8" fill="#0b0e1a" stroke="#1e2540"/>
  <text x="534" y="225" fill="#e8eaf0" font-family="system-ui" font-size="13">PDF</text>
