<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#0f1117"/>
  <!-- Nav -->
  <rect width="1200" height="48" fill="#161822"/>
  <text x="20" y="30" fill="#e1e1e6" font-family="system-ui" font-weight="700" font-size="18">🔥 Hestia</text>
  <text x="120" y="30" fill="#a0a3b1" font-family="system-ui" font-size="14">Dashboard</text>
  <text x="220" y="30" fill="#e1e1e6" font-family="system-ui" font-size="14" font-weight="500">Files</text>
  <text x="280" y="30" fill="#a0a3b1" font-family="system-ui" font-size="14">Pipelines</text>
  <text x="370" y="30" fill="#a0a3b1" font-family="system-ui" font-size="14">Storage</text>
  <text x="445" y="30" fill="#a0a3b1" font-family="system-ui" font-size="14">IoT</text>
  <text x="490" y="30" fill="#a0a3b1" font-family="system-ui" font-size="14">Admin</text>
  <line x1="220" y1="46" x2="265" y2="46" stroke="#4f5bff" stroke-width="2"/>
  <!-- Title -->
  <text x="40" y="90" fill="#e1e1e6" font-family="system-ui" font-size="24" font-weight="600">File Processing</text>
  <!-- Dropzone -->
  <rect x="40" y="110" width="1120" height="90" rx="8" fill="none" stroke="#2a2d3a" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="600" y="155" fill="#a0a3b1" font-family="system-ui" font-size="14" text-anchor="middle">Drag &amp; drop files here, or click to select</text>
  <text x="600" y="178" fill="#555" font-family="system-ui" font-size="12" text-anchor="middle">Supports PDF, PNG, JPEG, MP4, MKV, AVI, MP3, FLAC, WAV up to 10 GB</text>
  <!-- Operation selector card -->
  <rect x="40" y="220" width="1120" height="70" rx="8" fill="#161822" stroke="#2a2d3a"/>
  <text x="60" y="248" fill="#a0a3b1" font-family="system-ui" font-size="12">Operation</text>
  <rect x="60" y="254" width="200" height="28" rx="4" fill="#1e2030" stroke="#2a2d3a"/>
  <text x="72" y="273" fill="#e1e1e6" font-family="system-ui" font-size="13">OCR (make searchable)</text>
  <text x="300" y="248" fill="#a0a3b1" font-family="system-ui" font-size="12">Target format</text>
  <rect x="300" y="254" width="150" height="28" rx="4" fill="#1e2030" stroke="#2a2d3a"/>
  <text x="312" y="273" fill="#e1e1e6" font-family="system-ui" font-size="13">PDF</text>
  <rect x="490" y="254" width="90" height="28" rx="6" fill="#4f5bff"/>
  <text x="517" y="273" fill="#fff" font-family="system-ui" font-size="13" font-weight="500">Process</text>
  <!-- Jobs table -->
  <text x="40" y="330" fill="#a0a3b1" font-family="system-ui" font-size="16">Jobs</text>
  <!-- Header -->
  <text x="60" y="360" fill="#a0a3b1" font-family="system-ui" font-size="11" font-weight="600">ID</text>
  <text x="200" y="360" fill="#a0a3b1" font-family="system-ui" font-size="11" font-weight="600">TYPE</text>
  <text x="400" y="360" fill="#a0a3b1" font-family="system-ui" font-size="11" font-weight="600">STATUS</text>
  <text x="560" y="360" fill="#a0a3b1" font-family="system-ui" font-size="11" font-weight="600">PROGRESS</text>
  <text x="750" y="360" fill="#a0a3b1" font-family="system-ui" font-size="11" font-weight="600">ACTIONS</text>
  <line x1="40" y1="370" x2="1160" y2="370" stroke="#2a2d3a"/>
  <!-- Row 1 -->
  <text x="60" y="395" fill="#e1e1e6" font-family="monospace" font-size="12">a3f8c2d1</text>
  <text x="200" y="395" fill="#e1e1e6" font-family="system-ui" font-size="13">pdf_ocr</text>
  <rect x="400" y="382" width="80" height="20" rx="10" fill="#1a3a2a"/>
  <text x="416" y="396" fill="#4ade80" font-family="system-ui" font-size="11" font-weight="600">completed</text>
  <rect x="560" y="388" width="120" height="6" rx="3" fill="#2a2d3a"/>
  <rect x="560" y="388" width="120" height="6" rx="3" fill="#4f5bff"/>
  <rect x="750" y="380" width="80" height="26" rx="6" fill="#4f5bff"/>
  <text x="766" y="398" fill="#fff" font-family="system-ui" font-size="12" font-weight="500">Download</text>
  <line x1="40" y1="410" x2="1160" y2="410" stroke="#2a2d3a"/>
  <!-- Row 2 -->
  <text x="60" y="435" fill="#e1e1e6" font-family="monospace" font-size="12">b7e4f9a2</text>
  <text x="200" y="435" fill="#e1e1e6" font-family="system-ui" font-size="13">video_transcode</text>
  <rect x="400" y="422" width="65" height="20" rx="10" fill="#1a2a3a"/>
  <text x="413" y="436" fill="#60a5fa" font-family="system-ui" font-size="11" font-weight="600">running</text>
  <rect x="560" y="428" width="120" height="6" rx="3" fill="#2a2d3a"/>
  <rect x="560" y="428" width="78" height="6" rx="3" fill="#4f5bff"/>
  <text x="690" y="436" fill="#a0a3b1" font-family="system-ui" font-size="11">65%</text>
  <line x1="40" y1="450" x2="1160" y2="450" stroke="#2a2d3a"/>
  <!-- Row 3 -->
  <text x="60" y="475" fill="#e1e1e6" font-family="monospace" font-size="12">c1d2e3f4</text>
  <text x="200" y="475" fill="#e1e1e6" font-family="system-ui" font-size="13">pdf_compress</text>
  <rect x="400" y="462" width="65" height="20" rx="10" fill="#1a2a3a"/>
  <text x="412" y="476" fill="#60a5fa" font-family="system-ui" font-size="11" font-weight="600">pending</text>
  <rect x="560" y="468" width="120" height="6" rx="3" fill="#2a2d3a"/>
  <rect x="750" y="460" width="65" height="26" rx="6" fill="#dc2626"/>
  <text x="763" y="478" fill="#fff" font-family="system-ui" font-size="12" font-weight="500">Cancel</text>
  <line x1="40" y1="490" x2="1160" y2="490" stroke="#2a2d3a"/>
  <!-- Row 4 -->
  <text x="60" y="515" fill="#e1e1e6" font-family="monospace" font-size="12">d5e6f7a8</text>
  <text x="200" y="515" fill="#e1e1e6" font-family="system-ui" font-size="13">pdf_merge</text>
  <rect x="400" y="502" width="55" height="20" rx="10" fill="#3a1a1a"/>
  <text x="413" y="516" fill="#f87171" font-family="system-ui" font-size="11" font-weight="600">failed</text>
  <rect x="560" y="508" width="120" height="6" rx="3" fill="#2a2d3a"/>
  <rect x="560" y="508" width="48" height="6" rx="3" fill="#dc2626"/>
</svg>
