  <text x="480" y="315" fill="#e1e1e6" font-family="system-ui" font-size="13">smb, nfs</text>
  <text x="600" y="315" fill="#e1e1e6" font-family="system-ui" font-size="13">alex, sam, pat, chris</text>
  <text x="800" y="315" fill="#e1e1e6" font-family="system-ui" font-size="13">read-write</text>
  <rect x="950" y="302" width="60" height="24" rx="6" fill="#dc2626"/>
  <text x="963" y="319" fill="#fff" font-family="system-ui" font-size="12" font-weight="500">Delete</text>
  <line x1="40" y1="330" x2="1160" y2="330" stroke="#2a2d3a"/>
  <!-- Row 2 -->
  <text x="60" y="355" fill="#e1e1e6" font-family="system-ui" font-size="14" font-weight="600">alex-docs</text>
  <text x="220" y="355" fill="#e1e1e6" font-family="monospace" font-size="12">/srv/storage/alex</text>
  <text x="480" y="355" fill="#e1e1e6" font-family="system-ui" font-size="13">smb</text>
  <text x="600" y="355" fill="#e1e1e6" font-family="system-ui" font-size="13">alex</text>
  <text x="800" y="355" fill="#e1e1e6" font-family="system-ui" font-size="13">read-write</text>
  <rect x="950" y="342" width="60" height="24" rx="6" fill="#dc2626"/>
  <text x="963" y="359" fill="#fff" font-family="system-ui" font-size="12" font-weight="500">Delete</text>
  <line x1="40" y1="370" x2="1160" y2="370" stroke="#2a2d3a"/>
  <!-- Row 3 -->
  <text x="60" y="395" fill="#e1e1e6" font-family="system-ui" font-size="14" font-weight="600">backups</text>
  <text x="220" y="395" fill="#e1e1e6" font-family="monospace" font-size="12">/srv/storage/backups</text>
  <text x="480" y="395" fill="#e1e1e6" font-family="system-ui" font-size="13">smb</text>
  <text x="600" y="395" fill="#e1e1e6" font-family="system-ui" font-size="13">admin</text>
  <text x="800" y="395" fill="#e1e1e6" font-family="system-ui" font-size="13">read-only</text>
  <rect x="950" y="382" width="60" height="24" rx="6" fill="#dc2626"/>
  <text x="963" y="399" fill="#fff" font-family="system-ui" font-size="12" font-weight="500">Delete</text>
</svg>
